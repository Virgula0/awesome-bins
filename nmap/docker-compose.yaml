services:
  nmap-static-build-x86_64:
    container_name: nmap-static-build-x86_64-${nmap_VERSION:-7.99SVN}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        nmap_VERSION: ${nmap_VERSION:-7.99SVN}
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
      cache_from:
        - type=gha,scope=nmap-static-build-x86_64
      cache_to:
        - type=gha,mode=max,scope=nmap-static-build-x86_64
    image: nmap-static-build-x86_64
    platform: linux/amd64
    volumes:
      - ./bins/x86_64:/output
    networks:
      - nmap_default

  nmap-static-build-x86:
    container_name: nmap-static-build-x86-${nmap_VERSION:-7.99SVN}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        nmap_VERSION: ${nmap_VERSION:-7.99SVN}
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
      cache_from:
        - type=gha,scope=nmap-static-build-x86
      cache_to:
        - type=gha,mode=max,scope=nmap-static-build-x86
    image: nmap-static-build-x86
    platform: linux/386
    volumes:
      - ./bins/x86:/output
    networks:
      - nmap_default

  nmap-static-build-arm64:
    container_name: nmap-static-build-arm64-${nmap_VERSION:-7.99SVN}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        nmap_VERSION: ${nmap_VERSION:-7.99SVN}
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
      cache_from:
        - type=gha,scope=nmap-static-build-arm64
      cache_to:
        - type=gha,mode=max,scope=nmap-static-build-arm64
    image: nmap-static-build-arm64
    platform: linux/arm64
    volumes:
      - ./bins/arm64:/output
    networks:
      - nmap_default

  nmap-static-build-arm32:
    container_name: nmap-static-build-arm32-${nmap_VERSION:-7.99SVN}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        nmap_VERSION: ${nmap_VERSION:-7.99SVN}
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
      cache_from:
        - type=gha,scope=nmap-static-build-arm32
      cache_to:
        - type=gha,mode=max,scope=nmap-static-build-arm32
    image: nmap-static-build-arm32
    platform: linux/arm/v7
    volumes:
      - ./bins/arm32:/output
    networks:
      - nmap_default

networks:
  nmap_default: