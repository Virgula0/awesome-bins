services:
  tcpdump-static-build-x86_64:
    container_name: tcpdump-static-build-x86_64-${TCPDUMP_VERSION:-4.99.6}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TCPDUMP_VERSION: ${TCPDUMP_VERSION:-4.99.6}
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
      cache_from:
        - type=gha,scope=tcpdump-static-build-x86_64
      cache_to:
        - type=gha,mode=max,scope=tcpdump-static-build-x86_64
    image: tcpdump-static-build-x86_64
    platform: linux/amd64
    volumes:
      - ./bins/x86_64:/output
    networks:
      - tcpdump_default

  tcpdump-static-build-x86:
    container_name: tcpdump-static-build-x86-${TCPDUMP_VERSION:-4.99.6}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TCPDUMP_VERSION: ${TCPDUMP_VERSION:-4.99.6}
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
      cache_from:
        - type=gha,scope=tcpdump-static-build-x86
      cache_to:
        - type=gha,mode=max,scope=tcpdump-static-build-x86
    image: tcpdump-static-build-x86
    platform: linux/386
    volumes:
      - ./bins/x86:/output
    networks:
      - tcpdump_default

  tcpdump-static-build-arm64:
    container_name: tcpdump-static-build-arm64-${TCPDUMP_VERSION:-4.99.6}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TCPDUMP_VERSION: ${TCPDUMP_VERSION:-4.99.6}
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
      cache_from:
        - type=gha,scope=tcpdump-static-build-arm64
      cache_to:
        - type=gha,mode=max,scope=tcpdump-static-build-arm64
    image: tcpdump-static-build-arm64
    platform: linux/arm64
    volumes:
      - ./bins/arm64:/output
    networks:
      - tcpdump_default

  tcpdump-static-build-arm32:
    container_name: tcpdump-static-build-arm32-${TCPDUMP_VERSION:-4.99.6}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TCPDUMP_VERSION: ${TCPDUMP_VERSION:-4.99.6}
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
      cache_from:
        - type=gha,scope=tcpdump-static-build-arm32
      cache_to:
        - type=gha,mode=max,scope=tcpdump-static-build-arm32
    image: tcpdump-static-build-arm32
    platform: linux/arm/v7
    volumes:
      - ./bins/arm32:/output
    networks:
      - tcpdump_default

networks:
  tcpdump_default: