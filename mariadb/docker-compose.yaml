services:
  mariadb-static-build-x86_64:
    container_name: mariadb-static-build-x86_64-${MARIADB_VERSION:-12.2.2}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MARIADB_VERSION: ${MARIADB_VERSION:-12.2.2}
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
        TARGETARCH: amd64
      cache_from:
        - type=gha,scope=mariadb-static-build-x86_64
      cache_to:
        - type=gha,mode=max,scope=mariadb-static-build-x86_64
    image: mariadb-static-build-x86_64
    platform: linux/amd64
    volumes:
      - ./bins/x86_64:/output

  mariadb-static-build-x86:
    container_name: mariadb-static-build-x86-${MARIADB_VERSION:-12.2.2}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MARIADB_VERSION: ${MARIADB_VERSION:-12.2.2}
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
        TARGETARCH: 386
      cache_from:
        - type=gha,scope=mariadb-static-build-x86
      cache_to:
        - type=gha,mode=max,scope=mariadb-static-build-x86
    image: mariadb-static-build-x86
    platform: linux/386
    volumes:
      - ./bins/x86:/output

  mariadb-static-build-arm64:
    container_name: mariadb-static-build-arm64-${MARIADB_VERSION:-12.2.2}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MARIADB_VERSION: ${MARIADB_VERSION:-12.2.2}
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
        TARGETARCH: arm64
      cache_from:
        - type=gha,scope=mariadb-static-build-arm64
      cache_to:
        - type=gha,mode=max,scope=mariadb-static-build-arm64
    image: mariadb-static-build-arm64
    platform: linux/arm64
    volumes:
      - ./bins/arm64:/output

  mariadb-static-build-arm32:
    container_name: mariadb-static-build-arm32-${MARIADB_VERSION:-12.2.2}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MARIADB_VERSION: ${MARIADB_VERSION:-12.2.2}
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
        TARGETARCH: arm
      cache_from:
        - type=gha,scope=mariadb-static-build-arm32
      cache_to:
        - type=gha,mode=max,scope=mariadb-static-build-arm32
    image: mariadb-static-build-arm32
    platform: linux/arm/v7
    volumes:
      - ./bins/arm32:/output