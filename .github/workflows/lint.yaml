name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install System Dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.4.3
        with:
          packages: make
          version: 1.0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            make install-requirements
          fi

          make install-lint

      # Cache ruff for faster runs
      - name: Cache Ruff
        uses: actions/cache@v4
        with:
          path: .ruff_cache
          key: ${{ runner.os }}-ruff-${{ hashFiles('**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-ruff-

      - name: Run linter
        run: |
          make lint