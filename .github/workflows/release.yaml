name: Release

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ${{ (matrix.arch == 'arm64' || matrix.arch == 'arm32') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        module:
          - postgre
          - netcat_traditional
          - nmap
          - vim
        arch:
          - x86_64
          - x86
          - arm64
          - arm32

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up QEMU
        # x86_64 runner needs QEMU for arm arches, and vice-versa.
        # arm64 native runner still needs QEMU for x86/x86_64/arm32.
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean Bins
        run: make clean-bins

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: '**/requirements*.txt'

      - name: Install Dependencies
        run: |
          pip install python-on-whales
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run builder
        run: python3 main.py --single ${{ matrix.module }} --arch ${{ matrix.arch }}
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1

      # Artifact name now includes arch to avoid collisions
      - name: Upload bins
        uses: actions/upload-artifact@v4
        with:
          name: bins-${{ matrix.module }}-${{ matrix.arch }}
          path: ${{ matrix.module }}/bins/${{ matrix.arch }}/
          retention-days: 1

      - name: Upload compiled versions
        uses: actions/upload-artifact@v4
        with:
          name: compiled-versions-${{ matrix.module }}-${{ matrix.arch }}
          path: ${{ matrix.module }}/compiled_versions
          retention-days: 1

  check-releasable:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    outputs:
      changed: ${{ steps.check_changes.outputs.changed }}
      compiled_content: ${{ steps.compiled_info.outputs.compiled_content }}
    steps:
      - name: Download all compiled versions
        uses: actions/download-artifact@v4
        with:
          pattern: compiled-versions-*
          path: compiled-versions
          merge-multiple: false

      - name: Read compiled versions
        id: compiled_info
        run: |
          TEMP_FILE=$(mktemp)
          for f in compiled-versions/compiled-versions-*/*; do
            [ -f "$f" ] || continue
            cat "$f" >> "$TEMP_FILE"
          done
          COMPILED_CONTENT=$(sort -u "$TEMP_FILE" | sed '/^$/d')
          echo "compiled_content<<EOF" >> $GITHUB_OUTPUT
          echo "$COMPILED_CONTENT"     >> $GITHUB_OUTPUT
          echo "EOF"                   >> $GITHUB_OUTPUT

      - name: Check for changes against latest release
        id: check_changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_CONTENT: ${{ steps.compiled_info.outputs.compiled_content }}
        run: |
          OLD_CONTENT=$(gh release view --json body --template '{{.body}}' 2>/dev/null | sort -u | sed '/^$/d' || echo "none")
          CLEAN_OLD=$(echo "$OLD_CONTENT" | tr -d '[:space:]')
          CLEAN_NEW=$(echo "$NEW_CONTENT" | tr -d '[:space:]')
          if [ "$CLEAN_OLD" = "$CLEAN_NEW" ]; then
            echo "No changes detected. Skipping release."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  release:
    needs: [build, check-releasable]
    runs-on: ubuntu-latest
    if: needs.check-releasable.outputs.changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download all bins
        uses: actions/download-artifact@v4
        with:
          pattern: bins-*
          path: bins
          merge-multiple: false

      - name: Download all compiled versions
        uses: actions/download-artifact@v4
        with:
          pattern: compiled-versions-*
          path: compiled-versions
          merge-multiple: false

      # Restore bins — artifact dirs are now bins-<module>-<arch>/
      - name: Restore bins into expected paths
        run: |
          for artifact_dir in bins/bins-*/; do
            # Strip leading "bins/" and trailing "/"
            artifact_name="${artifact_dir#bins/bins-}"
            artifact_name="${artifact_name%/}"

            # Split on last "-" to get module and arch
            # e.g. "nmap-x86_64" → module=nmap, arch=x86_64
            # e.g. "netcat_traditional-arm64" → needs careful splitting
            arch="${artifact_name##*-}"
            module="${artifact_name%-*}"

            mkdir -p "$module/bins/$arch"
            cp -r "$artifact_dir/." "$module/bins/$arch/"
          done

      - name: Create archives
        run: |
          CREATED=0
          for version_file in compiled-versions/compiled-versions-*/*; do
            [ -f "$version_file" ] || continue

            PARENT_DIR=$(dirname "$version_file")
            ARTIFACT_NAME="${PARENT_DIR#compiled-versions/compiled-versions-}"
            arch="${ARTIFACT_NAME##*-}"
            MODULE_NAME="${ARTIFACT_NAME%-*}"

            while IFS=: read -r service version; do
              [ -n "$service" ] && [ -n "$version" ] || continue
              MODULE_DIR="$MODULE_NAME/bins/$arch"
              if [ -d "$MODULE_DIR" ] && [ "$(ls -A "$MODULE_DIR")" ]; then
                ARCHIVE_NAME="${MODULE_NAME}_${arch}_${version}.tar.gz"
                tar -czf "$ARCHIVE_NAME" -C "$MODULE_DIR" .
                echo "Created $ARCHIVE_NAME"
                CREATED=$((CREATED + 1))
              else
                echo "Warning: $MODULE_DIR is empty or missing — skipping"
              fi
            done < "$version_file"
          done

          if [ "$CREATED" -eq 0 ]; then
            echo "No archives were created — aborting release."
            exit 1
          fi

      - name: Determine release tag
        id: release_version
        run: |
          DATE=$(date +%Y_%m_%d)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          RELEASE_TAG="${DATE}-${SHORT_SHA}"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.release_version.outputs.release_tag }}
          name: Release ${{ steps.release_version.outputs.release_tag }}
          body: ${{ needs.check-releasable.outputs.compiled_content }}
          files: "*.tar.gz"
          fail_on_unmatched_files: true

  create-pr-weekly:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download all bins
        uses: actions/download-artifact@v4
        with:
          pattern: bins-*
          path: bins
          merge-multiple: false

      - name: Restore bins into expected paths
        run: |
          for artifact_dir in bins/bins-*/; do
            artifact_name="${artifact_dir#bins/bins-}"
            artifact_name="${artifact_name%/}"
            arch="${artifact_name##*-}"
            module="${artifact_name%-*}"
            mkdir -p "$module/bins/$arch"
            cp -r "$artifact_dir/." "$module/bins/$arch/"
          done

      - name: Get current date
        id: date
        run: echo "today=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: weekly release artifacts and lts_version update [skip ci]"
          branch: weekly-release-${{ steps.date.outputs.today }}
          title: "Weekly Release ${{ steps.date.outputs.today }}"
          body: |
            Automated weekly release PR.
            Contains updated `lts_version` files from latest successful builds.
          add-paths: |
            **/lts_version