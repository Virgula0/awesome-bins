name: Release

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix:
        module:
          - postgre
          - netcat_traditional
          - nmap
          - vim

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean Bins
        run: make clean-bins

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: '**/requirements*.txt'

      - name: Install Dependencies
        run: |
          pip install python-on-whales
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run builder
        run: python3 main.py --single ${{ matrix.module }}
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1

      - name: Upload bins
        uses: actions/upload-artifact@v4
        with:
          name: bins-${{ matrix.module }}
          path: ${{ matrix.module }}/bins/
          retention-days: 1

      # compiled_versions is a temporary file written by the builder that lists
      # what was actually compiled (e.g. pg-static-build-x86_64:16.1).
      # It is uploaded here so the release and weekly-pr jobs can read it.
      - name: Upload compiled versions
        uses: actions/upload-artifact@v4
        with:
          name: compiled-versions-${{ matrix.module }}
          path: ${{ matrix.module }}/compiled_versions
          retention-days: 1

  check-releasable:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    outputs:
      changed: ${{ steps.check_changes.outputs.changed }}
      compiled_content: ${{ steps.compiled_info.outputs.compiled_content }}
    steps:
      - name: Download all compiled versions
        uses: actions/download-artifact@v4
        with:
          pattern: compiled-versions-*
          path: compiled-versions
          merge-multiple: false

      - name: Read compiled versions
        id: compiled_info
        run: |
          # Use a temporary file to collect all lines then sort them
          TEMP_FILE=$(mktemp)

          # Find all compiled_versions files across all modules
          for f in compiled-versions/compiled-versions-*/*; do
            [ -f "$f" ] || continue
            cat "$f" >> "$TEMP_FILE"
          done

          # Sort and remove empty lines to ensure consistent comparison
          COMPILED_CONTENT=$(sort -u "$TEMP_FILE" | sed '/^$/d')

          echo "compiled_content<<EOF" >> $GITHUB_OUTPUT
          echo "$COMPILED_CONTENT"     >> $GITHUB_OUTPUT
          echo "EOF"                   >> $GITHUB_OUTPUT

      - name: Check for changes against latest release
        id: check_changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_CONTENT: ${{ steps.compiled_info.outputs.compiled_content }}
        run: |
          # Fetch the body, sort the lines, and strip whitespace/empty lines
          OLD_CONTENT=$(gh release view --json body --template '{{.body}}' 2>/dev/null | sort -u | sed '/^$/d' || echo "none")

          # Final cleanup for comparison: remove all spaces/tabs/newlines
          CLEAN_OLD=$(echo "$OLD_CONTENT" | tr -d '[:space:]')
          CLEAN_NEW=$(echo "$NEW_CONTENT" | tr -d '[:space:]')

          if [ "$CLEAN_OLD" = "$CLEAN_NEW" ]; then
            echo "No changes in binary versions detected. Skipping release."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  release:
    needs: [build, check-releasable]
    runs-on: ubuntu-latest
    if: needs.check-releasable.outputs.changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download all bins
        uses: actions/download-artifact@v4
        with:
          pattern: bins-*
          path: bins
          merge-multiple: false

      - name: Download all compiled versions
        uses: actions/download-artifact@v4
        with:
          pattern: compiled-versions-*
          path: compiled-versions
          merge-multiple: false

      # Restore each module's bins back into <module>/bins/ so paths that the
      # rest of the job expects (e.g. postgre/bins/x86_64/) are correct.
      - name: Restore bins into expected paths
        run: |
          for artifact_dir in bins/bins-*/; do
            module="${artifact_dir#bins/bins-}"
            module="${module%/}"
            mkdir -p "$module/bins"
            cp -r "$artifact_dir/." "$module/bins/"
          done

      # Produces one tar.gz per architecture and module found.
      # Fails early if no archives could be created.
      - name: Create archives
        run: |
          CREATED=0

          # Iterate through every module's compiled_versions file
          for version_file in compiled-versions/compiled-versions-*/*; do
            [ -f "$version_file" ] || continue

            # Extract module name from the directory name
            PARENT_DIR=$(dirname "$version_file")
            MODULE_NAME="${PARENT_DIR#compiled-versions/compiled-versions-}"

            while IFS=: read -r service version; do
              [ -n "$service" ] && [ -n "$version" ] || continue

              # Extract architecture from service name
              ARCH=$(echo "$service" | grep -oE 'x86_64|x86|arm64|arm32' || echo "")

              if [ -z "$ARCH" ]; then
                echo "Could not determine arch for $service — skipping"
                continue
              fi

              MODULE_DIR="$MODULE_NAME/bins/$ARCH"

              if [ -d "$MODULE_DIR" ] && [ "$(ls -A "$MODULE_DIR")" ]; then
                ARCHIVE_NAME="${MODULE_NAME}_${ARCH}_${version}.tar.gz"
                tar -czf "$ARCHIVE_NAME" -C "$MODULE_DIR" .
                echo "Created $ARCHIVE_NAME"
                CREATED=$((CREATED + 1))
              else
                echo "Warning: $MODULE_DIR is empty or missing — skipping"
              fi
            done < "$version_file"
          done

          if [ "$CREATED" -eq 0 ]; then
            echo "No archives were created — aborting release."
            exit 1
          fi

      # Computes a unique, date-based tag: v<YYYY.MM.DD>.<N>
      # N auto-increments per day so multiple releases on the same day are safe.
      - name: Determine release tag
        id: release_version
        run: |
          DATE=$(date +%Y_%m_%d)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          RELEASE_TAG="${DATE}-${SHORT_SHA}"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $RELEASE_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.release_version.outputs.release_tag }}
          name: Release ${{ steps.release_version.outputs.release_tag }}
          body: ${{ needs.check-releasable.outputs.compiled_content }}
          files: "*.tar.gz"
          fail_on_unmatched_files: true

  create-pr-weekly:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download all bins
        uses: actions/download-artifact@v4
        with:
          pattern: bins-*
          path: bins
          merge-multiple: false

      - name: Download all compiled versions
        uses: actions/download-artifact@v4
        with:
          pattern: compiled-versions-*
          path: compiled-versions
          merge-multiple: false

      - name: Restore bins into expected paths
        run: |
          for artifact_dir in bins/bins-*/; do
            module="${artifact_dir#bins/bins-}"
            module="${module%/}"
            mkdir -p "$module/bins"
            cp -r "$artifact_dir/." "$module/bins/"
          done

      - name: Get current date
        id: date
        run: echo "today=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: weekly release artifacts and lts_version update [skip ci]"
          branch: weekly-release-${{ steps.date.outputs.today }}
          title: "Weekly Release ${{ steps.date.outputs.today }}"
          body: |
            Automated weekly release PR.

            This PR was opened by the scheduled workflow and contains:
            - Updated `lts_version` files reflecting the latest successful builds.

            Please review and merge to trigger the release job.
          add-paths: |
            **/lts_version