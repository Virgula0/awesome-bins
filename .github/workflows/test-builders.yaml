name: Test Builders

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

permissions:
  contents: write

jobs:
  # Find all directories with a 'Dockerfile'
  list-folders:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          # Finds directories containing 'Dockerfile', excludes hidden dirs,
          # and formats them into a JSON array for the matrix
          FOLDERS=$(find . -maxdepth 3 -name "Dockerfile" -printf '%h\n' | sort -u | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=$FOLDERS" >> $GITHUB_OUTPUT

  build:
    needs: list-folders
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false # Keep building other folders even if one fails
      matrix:
        folder: ${{ fromJson(needs.list-folders.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean Bins
        run: make clean-bins

      - name: Build container and extract binaries
        run: |
          make build-container \
            BUILD_CONTEXT=${{ matrix.folder }} \
            CACHE_ARGS="--cache-from=type=gha --cache-to=type=gha,mode=max"

      - name: Setup PyPy
        uses: actions/setup-python@v6
        with:
          python-version: 'pypy3.14.4'
          cache: 'pip'
          cache-dependency-path: '**/requirements*.txt'

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run builder
        run: python3 my_script.py

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update versions for ${{ matrix.folder }} [skip ci]"
          file_pattern: "${{ matrix.folder }}/**/lts_version"

      - name: Debug results
        run: |
          make check-bins
          make check-compiled-versions