name: Test Builders

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

permissions:
  contents: write

jobs:
  build:
    if: github.event.pull_request.draft != true
    runs-on: ${{ (matrix.arch == 'arm64' || matrix.arch == 'arm32') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 120
    strategy:
      fail-fast: true
      matrix:
        module:
          - postgre
          - netcat_traditional
          - nmap
          - vim
          - tcpdump
          - openssh_portable
          - python3
          - gcc
        arch:
          - x86_64
          - x86
          - arm64
          - arm32

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean Bins
        run: make clean-bins

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: '**/requirements*.txt'

      - name: Install Dependencies
        run: |
          pip install python-on-whales
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run builder
        run: python3 main.py --single ${{ matrix.module }} --arch ${{ matrix.arch }}
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1