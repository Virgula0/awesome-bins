name: Test Builders

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # 1. Setup QEMU (CRITICAL)
      # This allows your Python script to run 'docker-compose' for
      # arm64, arm32, and x86 architectures on an amd64 runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Setup Docker Buildx
      # This ensures the docker daemon uses the modern BuildKit engine
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean Bins
        run: make clean-bins

      # 3. Setup Python environment
      - name: Setup PyPy
        uses: actions/setup-python@v6
        with:
          python-version: 'pypy3.14'
          cache: 'pip'
          cache-dependency-path: '**/requirements*.txt'

      - name: Install Dependencies
        run: |
          pip install python-on-whales
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run builder
        run: python3 main.py

      # 6. Commit the updated lts_version files
      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update versions [skip ci]"
          file_pattern: "**/lts_version"

      - name: Debug results
        run: |
          make check-bins
          make check-compiled-versions