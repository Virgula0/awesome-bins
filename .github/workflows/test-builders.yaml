name: Test Builders

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

permissions:
  contents: write

jobs:
  build:
    if: github.event.pull_request.draft != true
    timeout-minutes: 120
    strategy:
      fail-fast: true   # cancel all jobs if one arch fails
      matrix:
        include:
          # nmap
          - module: nmap
            arch: x86_64
            runner: ubuntu-latest
          - module: nmap
            arch: x86
            runner: ubuntu-latest
          - module: nmap
            arch: arm64
            runner: ubuntu-24.04-arm   # native, no QEMU
          - module: nmap
            arch: arm32
            runner: ubuntu-latest
          # postgre
          - module: postgre
            arch: x86_64
            runner: ubuntu-latest
          - module: postgre
            arch: x86
            runner: ubuntu-latest
          - module: postgre
            arch: arm64
            runner: ubuntu-24.04-arm
          - module: postgre
            arch: arm32
            runner: ubuntu-latest
          # netcat_traditional
          - module: netcat_traditional
            arch: x86_64
            runner: ubuntu-latest
          - module: netcat_traditional
            arch: x86
            runner: ubuntu-latest
          - module: netcat_traditional
            arch: arm64
            runner: ubuntu-24.04-arm
          - module: netcat_traditional
            arch: arm32
            runner: ubuntu-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up QEMU
        # arm64 runner is native — no QEMU needed there
        # x86_64 runner handles x86 (32-bit) natively via kernel, but
        # buildx still needs QEMU registered for linux/386 and linux/arm/v7
        if: matrix.runner == 'ubuntu-latest'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: '**/requirements*.txt'

      - name: Install dependencies
        run: |
          pip install python-on-whales requests
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run builder
        run: |
          python3 main.py \
            --single ${{ matrix.module }} \
            --arch ${{ matrix.arch }} \
            --no-multi-thread
        # No DOCKER_BUILDKIT needed (Docker 26+ default)
        # No COMPOSE_DOCKER_CLI_BUILD needed (Compose v2 ignores it)
        # ACTIONS_CACHE_URL + ACTIONS_RUNTIME_TOKEN auto-injected by GHA
        # (required for type=gha cache in docker-compose files)

      - name: Upload bins
        uses: actions/upload-artifact@v4
        with:
          # one artifact per module+arch combination
          name: bins-${{ matrix.module }}-${{ matrix.arch }}
          path: ${{ matrix.module }}/bins/${{ matrix.arch }}/
          retention-days: 1

  post-build:
    if: github.event.pull_request.draft != true
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bins-*
          merge-multiple: false
          path: artifacts/

      - name: Restore bins into expected paths
        run: |
          for artifact_dir in artifacts/bins-*/; do
            name="${artifact_dir#artifacts/bins-}"   # e.g. "nmap-x86_64/"
            name="${name%/}"                          # e.g. "nmap-x86_64"

            # split on last '-' to get module and arch
            # handles module names with underscores (netcat_traditional)
            arch="${name##*-}"                        # e.g. "x86_64"
            module="${name%-${arch}}"                 # e.g. "nmap" or "netcat_traditional"

            dest="${module}/bins/${arch}"
            mkdir -p "$dest"
            cp -r "${artifact_dir}/." "$dest/"
            echo "Restored: ${artifact_dir} → ${dest}/"
          done

      - name: Commit version files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update versions and build logs [skip ci]"
          file_pattern: "**/lts_version"

      - name: Debug results
        run: |
          make check-bins
          make check-compiled-versions

      - name: Clean up artifacts
        run: rm -rf artifacts/