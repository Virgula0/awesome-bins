name: Test Builders
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean Bins
        run: make clean-bins

      # Pre-create output dirs owned by the runner but world-writable,
      # so the in-container pguser (UID 1000) can copy files into them.
      - name: Prepare output directories
        run: |
          chmod -R 777 bins/

      - name: Warmup Docker Cache (All Dockerfiles)
        run: |
          for f in $(find . -name "Dockerfile"); do
            dir=$(dirname "$f")
            cache_name=$(echo $dir | sed 's/\//-/g' | sed 's/^\.//' | sed 's/^-//')
            echo "Warming up cache for $dir (slug: $cache_name)"
            docker buildx build "$dir" \
              --file "$f" \
              --cache-from=type=gha,scope=$cache_name \
              --cache-to=type=gha,mode=max,scope=$cache_name \
              --load
          done

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: '**/requirements*.txt'

      - name: Install Dependencies
        run: |
          pip install python-on-whales
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run builder
        run: python3 main.py
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update versions and build logs [skip ci]"
          file_pattern: "**/lts_version"

      - name: Debug results
        run: |
          make check-bins
          make check-compiled-versions